# dnsmasq config for netlab DNS namespace (ns-dns)
no-daemon
log-queries
log-facility=-

# Bind to namespace interface only.
interface=veth-dns
bind-interfaces
listen-address=10.0.0.53

# Keep resolution deterministic for the lab.
no-resolv
no-hosts
address=/target.lab/10.0.0.10

# Allow queries from lab network
local=/lab/
domain=lab
